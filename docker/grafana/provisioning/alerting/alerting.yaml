apiVersion: 1

# 1. 第一步：配置联系人 (Contact Points) - 以钉钉和邮件为例
contactPoints:
  - name: 'Default-Alert-Group'
    receivers:
      - uid: 'email-receiver'
        type: 'email'
        settings:
          addresses: 'fayne@mobilenowgroup.com' # 接收告警的邮箱
      - uid: 'dingding-receiver'
        type: 'dingding'
        settings:
          url: 'https://oapi.dingtalk.com/robot/send?access_token=7d777a3d99c57291befcc6ca857bbd41ccf91c1f21df216dec806353139a7cb8' # 你的钉钉机器人Webhook地址

# 2. 第二步：配置通知策略 (Notification Policies) - 绑定告警去向
policies:
  - orgId: 1
    receiver: 'Default-Alert-Group' # 所有没有特殊分类的告警，全部默认发送到上面这个组
    group_by: ['alertname', 'name']
    group_wait: '10s'
    group_interval: '5m'
    repeat_interval: '3h'

# 3. 第三步：配置告警规则 (Alert Rules) - 写入 PromQL 表达式
groups:
  - orgId: 1
    name: 'Website-Monitor-Alerts'
    folder: 'Site Monitoring'
    interval: '1m' # 每 1 分钟检测一次
    rules:
      # 规则 A：SSL 证书过期告警
      - uid: 'ssl_expiry_alert_uid'
        title: '🔒 SSL 证书即将过期告警'
        condition: 'A'
        for: '2m' # 持续 2 分钟异常才真正发通知，防止网络抖动误报
        data:
          - refId: 'A'
            datasourceUid: 'prometheus' # 必须与你配置的普罗米修斯数据源UID一致
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: 'laravel_monitor_ssl_certificate_expiry_days < 30'
              type: 'query'
        annotations:
          summary: '站点 {{ $labels.name }} 的 SSL 证书还有 {{ $value }} 天就要过期了！'
          description: '检测到目标 URL: {{ $labels.url }} 证书有效期不足 30 天，请尽快更新证书。'
      
      # 规则 B：非 200 错误率超标告警
      - uid: 'http_error_rate_alert_uid'
        title: '🚨 站点访问错误率超标告警'
        condition: 'A'
        for: '3m' # 持续 3 分钟异常才发通知
        data:
          - refId: 'A'
            datasourceUid: 'prometheus'
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: 'sum(rate(laravel_monitor_url_requests_total{status!="200"}[5m])) by (name, url) / sum(rate(laravel_monitor_url_requests_total[5m])) by (name, url) * 100 > 5'
              type: 'query'
        annotations:
          summary: '站点 {{ $labels.name }} 访问异常！'
          description: '目标 URL: {{ $labels.url }} 最近 5 分钟内的非 200 请求占比已达 {{ $value }}%，超过 5% 的阈值，请检查服务状态。'